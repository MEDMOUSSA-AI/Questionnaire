<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل الإجابة #{{ response.id }}</title>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@700&family=Tajawal:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#16233D; --paper:#EEF1F6; --line:#C7D0DE; --bronze:#9C7A32; --teal:#1F6F5C; --danger:#9C4A3A; --white:#FCFBF8; }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--paper);
    background-image:linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:42px 42px;
    font-family:'Tajawal', sans-serif; color:var(--ink); min-height:100vh; padding:32px 16px 80px;
  }
  .wrap{ max-width:820px; margin:0 auto; }
  .back{ display:inline-block; margin-bottom:16px; font-family:'IBM Plex Mono', monospace; font-size:12.5px; color:var(--bronze); text-decoration:none; }

  .sheet{ background:var(--white); border:1px solid var(--line); }
  header{ padding:32px 40px; border-bottom:3px double var(--ink); display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:16px; }
  header h1{ font-family:'Aref Ruqaa', serif; font-size:22px; margin-bottom:8px; }
  header .meta{ font-family:'IBM Plex Mono', monospace; font-size:12px; color:#5A6785; }
  .actions{ display:flex; gap:10px; }
  .btn{
    display:inline-flex; align-items:center; gap:6px; padding:10px 18px;
    font-family:'Tajawal', sans-serif; font-weight:600; font-size:13.5px; cursor:pointer;
    border:1px solid var(--ink); background:var(--ink); color:var(--white); text-decoration:none;
  }
  .btn.ghost{ background:transparent; color:var(--ink); }
  .btn.danger{ border-color:var(--danger); color:var(--danger); background:transparent; }

  table{ width:100%; border-collapse:collapse; }
  td{ padding:16px 40px; border-bottom:1px solid var(--line); vertical-align:top; }
  td.q{ width:45%; font-size:13.5px; color:#3A4763; }
  td.a{ font-size:14px; font-weight:500; }
  tr:last-child td{ border-bottom:none; }

  form.inline{ display:inline; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="{{ url_for('admin_dashboard') }}">→ العودة إلى القائمة</a>
  <div class="sheet">
    <header>
      <div>
        <h1>الإجابة رقم {{ '%03d' % response.id }}</h1>
        <div class="meta">{{ response.created_at }} &nbsp;|&nbsp; اللغة: {{ response.lang }}</div>
      </div>
      <div class="actions">
        <a class="btn" href="{{ url_for('admin_export_word', response_id=response.id) }}">⬇ تنزيل Word</a>
        <form class="inline" method="POST" action="{{ url_for('admin_response_delete', response_id=response.id) }}" onsubmit="return confirm('هل أنت متأكد من حذف هذه الإجابة؟');">
          <button class="btn danger" type="submit" style="cursor:pointer;">حذف</button>
        </form>
      </div>
    </header>
    <table>
      {% for item in items %}
      <tr>
        <td class="q">{{ item.label }}<br><span style="color:#9AA5BD; font-size:11.5px;">{{ item.label_fr }}</span></td>
        <td class="a">{{ item.value or '—' }}</td>
      </tr>
      {% endfor %}
    </table>
  </div>
</div>
</body>
</html>
