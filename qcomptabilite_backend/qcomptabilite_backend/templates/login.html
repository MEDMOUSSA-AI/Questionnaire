<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — لوحة الإدارة</title>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@700&family=Tajawal:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#16233D; --paper:#EEF1F6; --line:#C7D0DE; --bronze:#9C7A32; --danger:#9C4A3A; --white:#FCFBF8; }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--paper);
    background-image:linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:42px 42px;
    font-family:'Tajawal', sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .card{
    background:var(--white); border:1px solid var(--line); max-width:380px; width:100%;
    padding:40px 36px; box-shadow:0 18px 40px -20px rgba(22,35,61,0.25);
  }
  .eyebrow{ font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--bronze); letter-spacing:.1em; margin-bottom:10px; }
  h1{ font-family:'Aref Ruqaa', serif; font-size:24px; color:var(--ink); margin-bottom:24px; border-bottom:3px double var(--ink); padding-bottom:14px; }
  label{ display:block; font-size:13px; margin-bottom:6px; color:var(--ink); font-weight:500; }
  input{
    width:100%; padding:11px 13px; border:1px solid var(--line); background:var(--paper);
    font-family:'Tajawal', sans-serif; font-size:14px; margin-bottom:18px;
  }
  input:focus{ outline:2px solid var(--bronze); outline-offset:1px; }
  button{
    width:100%; padding:13px; border:none; background:var(--ink); color:var(--white);
    font-family:'Tajawal', sans-serif; font-weight:700; font-size:14px; cursor:pointer;
  }
  button:hover{ background:#0F192D; }
  .flash{ background:#F4E3DF; border-inline-start:3px solid var(--danger); color:var(--danger);
    padding:10px 14px; font-size:13px; margin-bottom:18px; }
</style>
</head>
<body>
  <form class="card" method="POST">
    <div class="eyebrow">لوحة الإدارة</div>
    <h1>تسجيل الدخول</h1>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}
      {% endif %}
    {% endwith %}
    <label for="username">اسم المستخدم</label>
    <input type="text" id="username" name="username" required autofocus>
    <label for="password">كلمة المرور</label>
    <input type="password" id="password" name="password" required>
    <button type="submit">دخول</button>
  </form>
</body>
</html>
